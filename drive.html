<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>My Drive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
:root{
  --blue:#1a73e8;--blue-h:#1557b0;--red:#d93025;--red-bg:#fce8e6;
  --green:#1e8e3e;--grn-bg:#e6f4ea;
  --bg:#f8f9fa;--surf:#ffffff;--hov:#f1f3f4;--border:#dadce0;
  --t1:#202124;--t2:#3c4043;--t3:#5f6368;--t4:#80868b;
  --gs:'Google Sans','Roboto',system-ui,sans-serif;
  --rb:'Roboto',system-ui,sans-serif;
  --hh:64px;--r:4px;--rl:12px;--tr:.2s cubic-bezier(.4,0,.2,1);
}
body{font-family:var(--rb);background:var(--bg);color:var(--t2);-webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh}
.header{position:fixed;top:0;left:0;right:0;height:var(--hh);background:var(--surf);border-bottom:1px solid var(--border);z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.header-left{display:flex;align-items:center;gap:16px}
.logo-text{font-family:var(--gs);font-size:1.25rem;font-weight:500;color:var(--t1);letter-spacing:-0.2px}
.header-right{display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 18px;font-family:var(--gs);font-size:.85rem;font-weight:500;border:none;border-radius:var(--r);cursor:pointer;transition:all var(--tr);text-decoration:none;white-space:nowrap}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-h);box-shadow:0 1px 2px rgba(60,64,67,.3),0 2px 6px rgba(60,64,67,.15)}
.btn-primary:disabled{background:var(--hov);color:var(--t4);cursor:not-allowed;box-shadow:none}
.btn-outline{background:transparent;color:var(--blue);border:1px solid var(--border)}
.btn-outline:hover{background:#e8f0fe;border-color:var(--blue)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{opacity:.9}
.icon-btn{width:40px;height:40px;border:none;background:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);transition:background var(--tr);flex-shrink:0}
.icon-btn:hover{background:var(--hov)}
.icon-btn svg{width:20px;height:20px}
.main{padding-top:calc(var(--hh) + 24px);max-width:1200px;margin:0 auto;padding-left:24px;padding-right:24px;padding-bottom:40px}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.toolbar h2{font-family:var(--gs);font-size:1.5rem;font-weight:500;color:var(--t1)}
.toolbar-actions{display:flex;gap:8px;align-items:center}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.folder-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);padding:20px;cursor:pointer;transition:all var(--tr);display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px;position:relative}
.folder-card:hover{box-shadow:0 1px 3px rgba(60,64,67,.3),0 4px 8px 3px rgba(60,64,67,.15);transform:translateY(-2px)}
.folder-card .card-menu{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;display:none;align-items:center;justify-content:center;background:var(--surf);border:1px solid var(--border);cursor:pointer;z-index:2}
.folder-card:hover .card-menu{display:flex}
.folder-card .card-menu:hover{background:var(--hov)}
.folder-card .card-menu svg{width:14px;height:14px;color:var(--t3)}
.folder-icon{width:56px;height:56px;border-radius:var(--rl);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.folder-icon svg{width:28px;height:28px}
.folder-name{font-family:var(--gs);font-size:.9rem;font-weight:500;color:var(--t1);word-break:break-word;line-height:1.3}
.folder-meta{font-size:.75rem;color:var(--t4)}
.spinner-lg{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:60px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
.alert{padding:10px 14px;border-radius:var(--r);font-size:.8rem;margin-bottom:16px;display:none;max-width:400px}
.alert-e{display:block;background:var(--red-bg);color:var(--red);border:1px solid rgba(217,48,37,.2)}
.alert-s{display:block;background:var(--grn-bg);color:var(--green);border:1px solid rgba(30,142,62,.2)}
.empty-state{text-align:center;padding:80px 20px}
.empty-state svg{width:64px;height:64px;color:var(--t4);margin-bottom:16px}
.empty-state h3{font-family:var(--gs);font-size:1.1rem;font-weight:500;color:var(--t2);margin-bottom:8px}
.empty-state p{font-size:.875rem;color:var(--t3);margin-bottom:20px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);padding:32px;width:100%;max-width:420px;box-shadow:0 24px 50px rgba(0,0,0,.3)}
.modal h3{font-family:var(--gs);font-size:1.2rem;font-weight:500;color:var(--t1);margin-bottom:20px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.field{margin-bottom:16px}
.field-label{display:block;font-size:.75rem;font-weight:500;color:var(--t3);margin-bottom:4px;letter-spacing:.3px}
.field-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r);font-family:var(--rb);font-size:.9rem;color:var(--t1);background:var(--surf);outline:none;transition:border var(--tr)}
.field-input:hover{border-color:var(--t3)}
.field-input:focus{border:2px solid var(--blue);padding:9px 11px}
.color-picker{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all var(--tr);flex-shrink:0}
.color-dot:hover{border-color:var(--t3);transform:scale(1.15)}
.color-dot.selected{border-color:var(--t1);box-shadow:0 0 0 2px var(--surf),0 0 0 4px var(--t1)}
.view-toggle{display:flex;gap:0}
.view-toggle button{padding:6px 12px;border:1px solid var(--border);background:var(--surf);cursor:pointer;font-size:.8rem;color:var(--t3);transition:all var(--tr);display:flex;align-items:center;gap:4px}
.view-toggle button:first-child{border-radius:var(--r) 0 0 var(--r)}
.view-toggle button:last-child{border-radius:0 var(--r) var(--r) 0}
.view-toggle button.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.grid.list-view{grid-template-columns:1fr;max-width:600px}
.grid.list-view .folder-card{flex-direction:row;text-align:left;padding:14px 18px;gap:14px}
.grid.list-view .folder-icon{width:36px;height:36px;border-radius:8px}
.grid.list-view .folder-icon svg{width:20px;height:20px}
.grid.list-view .folder-card .card-menu{top:50%;transform:translateY(-50%);right:12px}
.toast{position:fixed;bottom:24px;left:24px;z-index:9999;padding:14px 24px;border-radius:var(--r);background:#323232;color:#f5f5f5;font-size:.875rem;box-shadow:0 3px 5px -1px rgba(0,0,0,.2),0 6px 10px rgba(0,0,0,.14);transform:translateY(80px);opacity:0;transition:all .25s cubic-bezier(0,0,.2,1);pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
/* Context menu */
.context-menu{position:fixed;background:var(--surf);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:300;min-width:160px;padding:4px 0;display:none}
.context-menu .menu-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:.85rem;color:var(--t2);transition:background var(--tr)}
.context-menu .menu-item:hover{background:var(--hov)}
.context-menu .menu-item svg{width:16px;height:16px;color:var(--t3)}
.context-menu .menu-item.danger{color:var(--red)}
.context-menu .menu-item.danger svg{color:var(--red)}
@media(max-width:600px){.grid{grid-template-columns:1fr 1fr;gap:10px}.folder-card{padding:14px}.main{padding-left:16px;padding-right:16px}}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:28px;height:28px;color:var(--t3)">
      <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
      <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
    </svg>
    <span class="logo-text">My Drive</span>
  </div>
  <div class="header-right">
    <a href="settings.html" class="icon-btn" title="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </a>
    <button class="icon-btn" onclick="logout()" title="Sign out">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</header>

<main class="main">
  <div class="toolbar">
    <h2 id="pageTitle">Folders</h2>
    <div class="toolbar-actions">
      <div class="view-toggle">
        <button onclick="setView('grid')" id="viewGridBtn" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Grid
        </button>
        <button onclick="setView('list')" id="viewListBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          List
        </button>
      </div>
      <button class="btn btn-primary" onclick="openNewFolderModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Folder
      </button>
    </div>
  </div>

  <div class="alert" id="alert"></div>
  <div class="spinner-lg" id="spinner"></div>
  <div class="grid" id="grid"></div>
</main>

<!-- Context Menu -->
<div class="context-menu" id="contextMenu">
  <div class="menu-item" onclick="contextEdit()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    Edit
  </div>
  <div class="menu-item" onclick="contextOpen()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    Open
  </div>
  <div class="menu-item danger" onclick="contextDelete()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    Delete
  </div>
</div>

<!-- Folder Modal -->
<div class="modal-overlay" id="folderModal">
  <div class="modal">
    <h3 id="modalTitle">New Folder</h3>
    <div class="alert" id="modalAlert"></div>
    <div class="field">
      <label class="field-label" for="folderName">Folder name</label>
      <input type="text" class="field-input" id="folderName" placeholder="Enter folder name">
    </div>
    <div class="field">
      <label class="field-label">Color</label>
      <div class="color-picker" id="colorPicker"></div>
    </div>
    <input type="hidden" id="editFolderId" value="">
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeFolderModal()">Cancel</button>
      <button class="btn btn-primary" id="saveFolderBtn" onclick="saveFolder()">
        <span id="saveBtnText">Create</span>
        <span class="spinner" id="saveSpinner"></span>
      </button>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h3>Delete folder?</h3>
    <p style="font-size:.9rem;color:var(--t3);margin-bottom:8px">All items inside this folder will also be deleted. This cannot be undone.</p>
    <div class="alert" id="deleteAlert"></div>
    <input type="hidden" id="deleteFolderId" value="">
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const token = localStorage.getItem('sw_token');
const user = JSON.parse(localStorage.getItem('sw_user') || 'null');
const masterKeyB64 = sessionStorage.getItem('sw_master_key');
const salt = localStorage.getItem('sw_salt');

if (!token || !user || !masterKeyB64 || !salt) {
  window.location.href = 'index.html';
}

const API = '/api';
let currentView = 'grid';
let contextFolder = null;

const colors = ['#1a73e8','#d93025','#1e8e3e','#f9ab00','#9333ea','#e37400','#0d9488','#ec4899','#6366f1','#444444','#14b8a6','#f43f5e'];
let selectedColor = '#1a73e8';

// Crypto helpers
function strToBuf(str) { return new TextEncoder().encode(str); }
function bufToB64(buf) { return btoa(String.fromCharCode(...new Uint8Array(buf))); }
function b64ToBuf(b64) { return Uint8Array.from(atob(b64), c => c.charCodeAt(0)); }

async function getKey() {
  const raw = b64ToBuf(masterKeyB64);
  return await crypto.subtle.importKey('raw', raw, 'AES-GCM', false, ['encrypt', 'decrypt']);
}

async function encrypt(text) {
  const key = await getKey();
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, strToBuf(text));
  return { encrypted: bufToB64(encrypted), iv: bufToB64(iv) };
}

async function decrypt(encryptedB64, ivB64) {
  try {
    const key = await getKey();
    const iv = b64ToBuf(ivB64);
    const encrypted = b64ToBuf(encryptedB64);
    const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, encrypted);
    return new TextDecoder().decode(decrypted);
  } catch { return null; }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = String(s || '');
  return d.innerHTML;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function showAlert(msg) {
  const el = document.getElementById('alert');
  el.textContent = msg;
  el.className = 'alert alert-e';
}

function showModalAlert(msg) {
  const el = document.getElementById('modalAlert');
  el.textContent = msg;
  el.className = 'alert alert-e';
}

function clearModalAlert() {
  const el = document.getElementById('modalAlert');
  el.className = 'alert';
  el.textContent = '';
}

// ====== VIEW ======
function setView(view) {
  currentView = view;
  document.getElementById('viewGridBtn').classList.toggle('active', view === 'grid');
  document.getElementById('viewListBtn').classList.toggle('active', view === 'list');
  document.getElementById('grid').className = view === 'list' ? 'grid list-view' : 'grid';
}

// ====== CONTEXT MENU ======
function showContextMenu(e, folder) {
  e.preventDefault();
  e.stopPropagation();
  contextFolder = folder;
  const menu = document.getElementById('contextMenu');
  menu.style.display = 'block';
  menu.style.left = Math.min(e.clientX, window.innerWidth - 170) + 'px';
  menu.style.top = Math.min(e.clientY, window.innerHeight - 120) + 'px';
}

function hideContextMenu() {
  document.getElementById('contextMenu').style.display = 'none';
  contextFolder = null;
}

function contextOpen() {
  if (contextFolder) window.location.href = 'folder.html?id=' + contextFolder.id;
  hideContextMenu();
}

function contextEdit() {
  if (contextFolder) openEditFolderModal(contextFolder);
  hideContextMenu();
}

function contextDelete() {
  if (contextFolder) openDeleteModal(contextFolder.id);
  hideContextMenu();
}

document.addEventListener('click', hideContextMenu);

// ====== FOLDER MODAL ======
function renderColorPicker(selected) {
  const picker = document.getElementById('colorPicker');
  picker.innerHTML = colors.map(c => `
    <div class="color-dot${c === selected ? ' selected' : ''}" 
         style="background:${c}" 
         onclick="selectColor('${c}')" 
         data-color="${c}"></div>
  `).join('');
}

function selectColor(color) {
  selectedColor = color;
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
  document.querySelector(`.color-dot[data-color="${color}"]`).classList.add('selected');
}

function openNewFolderModal() {
  clearModalAlert();
  document.getElementById('modalTitle').textContent = 'New Folder';
  document.getElementById('folderName').value = '';
  document.getElementById('editFolderId').value = '';
  document.getElementById('saveBtnText').textContent = 'Create';
  selectedColor = colors[Math.floor(Math.random() * colors.length)];
  renderColorPicker(selectedColor);
  document.getElementById('folderModal').classList.add('open');
  setTimeout(() => document.getElementById('folderName').focus(), 100);
}

function openEditFolderModal(folder) {
  clearModalAlert();
  document.getElementById('modalTitle').textContent = 'Edit Folder';
  document.getElementById('editFolderId').value = folder.id;
  document.getElementById('saveBtnText').textContent = 'Update';
  selectedColor = folder.color || '#1a73e8';
  renderColorPicker(selectedColor);
  decrypt(folder.name_enc, folder.iv).then(name => {
    document.getElementById('folderName').value = name || '';
  });
  document.getElementById('folderModal').classList.add('open');
}

function closeFolderModal() {
  document.getElementById('folderModal').classList.remove('open');
}

async function saveFolder() {
  const name = document.getElementById('folderName').value.trim();
  if (!name) { showModalAlert('Please enter a folder name.'); return; }

  const editId = document.getElementById('editFolderId').value;
  const btn = document.getElementById('saveFolderBtn');
  btn.disabled = true;
  document.getElementById('saveSpinner').style.display = 'inline-block';
  document.getElementById('saveBtnText').style.display = 'none';

  const { encrypted, iv } = await encrypt(name);

  const url = editId ? API + '/folders/' + editId : API + '/folders';
  const method = editId ? 'PUT' : 'POST';
  const body = { name_enc: encrypted, iv, color: selectedColor };
  if (!editId) body.parent_id = null;

  try {
    const res = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify(body)
    });
    if (!res.ok) { showModalAlert('Failed to save folder.'); }
    else {
      showToast(editId ? 'Folder updated.' : 'Folder created.');
      closeFolderModal();
      loadFolders();
    }
  } catch {
    showModalAlert('Network error.');
  }

  btn.disabled = false;
  document.getElementById('saveSpinner').style.display = 'none';
  document.getElementById('saveBtnText').style.display = 'inline';
}

// ====== DELETE MODAL ======
function openDeleteModal(id) {
  document.getElementById('deleteFolderId').value = id;
  document.getElementById('deleteModal').classList.add('open');
}

function closeDeleteModal() {
  document.getElementById('deleteModal').classList.remove('open');
}

async function confirmDelete() {
  const id = document.getElementById('deleteFolderId').value;
  try {
    const res = await fetch(API + '/folders/' + id, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + token }
    });
    closeDeleteModal();
    if (res.ok) { showToast('Folder deleted.'); loadFolders(); }
    else { showToast('Failed to delete folder.'); }
  } catch {
    closeDeleteModal();
    showToast('Network error.');
  }
}

// ====== LOAD FOLDERS ======
async function loadFolders() {
  const grid = document.getElementById('grid');
  const spinner = document.getElementById('spinner');
  grid.innerHTML = '';
  spinner.style.display = 'block';
  document.getElementById('alert').className = 'alert';

  try {
    const res = await fetch(API + '/folders', {
      headers: { 'Authorization': 'Bearer ' + token }
    });

    if (!res.ok) {
      spinner.style.display = 'none';
      showAlert('Failed to load folders.');
      return;
    }

    const folders = await res.json();
    spinner.style.display = 'none';

    if (!Array.isArray(folders) || folders.length === 0) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          <h3>No folders yet</h3>
          <p>Create a folder to start organizing your files</p>
          <button class="btn btn-primary" onclick="openNewFolderModal()">New Folder</button>
        </div>
      `;
      return;
    }

    for (const folder of folders) {
      const name = await decrypt(folder.name_enc, folder.iv);
      const card = document.createElement('div');
      card.className = 'folder-card';
      card.onclick = () => { window.location.href = 'folder.html?id=' + folder.id; };
      card.oncontextmenu = (e) => { showContextMenu(e, folder); };
      card.innerHTML = `
        <button class="card-menu" onclick="event.stopPropagation();showContextMenu(event, {id:${folder.id},name_enc:'${folder.name_enc}',iv:'${folder.iv}',color:'${folder.color}'})">
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
        </button>
        <div class="folder-icon" style="background:${folder.color || '#444'}">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <div class="folder-name">${esc(name || '...')}</div>
        <div class="folder-meta">${folder.created_at ? new Date(folder.created_at).toLocaleDateString() : ''}</div>
      `;
      grid.appendChild(card);
    }
  } catch {
    spinner.style.display = 'none';
    showAlert('Network error. Please try again.');
  }
}

function logout() {
  localStorage.removeItem('sw_token');
  localStorage.removeItem('sw_user');
  sessionStorage.clear();
  window.location.href = 'index.html';
}

// Auto-lock after 10 min idle
let idleTimer;
function resetIdleTimer() {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => {
    sessionStorage.removeItem('sw_master_key');
    window.location.href = 'unlock.html';
  }, 10 * 60 * 1000);
}
document.addEventListener('mousemove', resetIdleTimer);
document.addEventListener('keydown', resetIdleTimer);
document.addEventListener('click', resetIdleTimer);
resetIdleTimer();

// Close modals
document.getElementById('folderModal').addEventListener('click', function(e) { if (e.target === this) closeFolderModal(); });
document.getElementById('deleteModal').addEventListener('click', function(e) { if (e.target === this) closeDeleteModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeFolderModal(); closeDeleteModal(); hideContextMenu(); } });

// Init
setView('grid');
loadFolders();
</script>
</body>
</html>
