<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Sign in — My Drive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
:root{
  --blue:#1a73e8;--blue-h:#1557b0;--red:#d93025;--red-bg:#fce8e6;
  --green:#1e8e3e;--grn-bg:#e6f4ea;--yellow:#f9ab00;--yel-bg:#fef7e0;
  --bg:#f8f9fa;--surf:#ffffff;--hov:#f1f3f4;--border:#dadce0;
  --t1:#202124;--t2:#3c4043;--t3:#5f6368;--t4:#80868b;
  --gs:'Google Sans','Roboto',system-ui,sans-serif;
  --rb:'Roboto',system-ui,sans-serif;
  --r:4px;--rl:12px;--tr:.2s cubic-bezier(.4,0,.2,1);
}
body{
  font-family:var(--rb);background:var(--bg);color:var(--t2);
  -webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.login-card{
  background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);
  padding:48px 40px;width:100%;max-width:400px;box-shadow:0 1px 3px rgba(60,64,67,.15);
}
.login-header{text-align:center;margin-bottom:32px}
.login-header svg{width:48px;height:48px;color:var(--t3);margin-bottom:12px}
.login-header h1{font-family:var(--gs);font-size:1.5rem;font-weight:500;color:var(--t1);margin-bottom:4px}
.login-header p{font-size:.875rem;color:var(--t3)}
.field{margin-bottom:20px}
.field-label{display:block;font-size:.75rem;font-weight:500;color:var(--t3);margin-bottom:4px;letter-spacing:.3px}
.field-input{
  width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--r);
  font-family:var(--rb);font-size:.95rem;color:var(--t1);background:var(--surf);
  outline:none;transition:border var(--tr)
}
.field-input:hover{border-color:var(--t3)}
.field-input:focus{border:2px solid var(--blue);padding:11px 13px}
.alert{padding:10px 14px;border-radius:var(--r);font-size:.8rem;margin-bottom:16px;display:none}
.alert-e{display:block;background:var(--red-bg);color:var(--red);border:1px solid rgba(217,48,37,.2)}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:12px 24px;font-family:var(--gs);font-size:.875rem;font-weight:500;
  border:none;border-radius:var(--r);cursor:pointer;transition:all var(--tr);
  text-decoration:none;white-space:nowrap;width:100%
}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-h);box-shadow:0 1px 2px rgba(60,64,67,.3),0 2px 6px rgba(60,64,67,.15)}
.btn-primary:disabled{background:var(--hov);color:var(--t4);cursor:not-allowed;box-shadow:none}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{
  position:fixed;bottom:24px;left:24px;z-index:9999;padding:14px 24px;
  border-radius:var(--r);background:#323232;color:#f5f5f5;font-size:.875rem;
  box-shadow:0 3px 5px -1px rgba(0,0,0,.2),0 6px 10px rgba(0,0,0,.14);
  transform:translateY(80px);opacity:0;transition:all .25s cubic-bezier(0,0,.2,1);pointer-events:none
}
.toast.show{transform:translateY(0);opacity:1}
</style>
</head>
<body>

<div class="login-card">
  <div class="login-header">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
      <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
    </svg>
    <h1>Sign in</h1>
    <p>to continue to your drive</p>
  </div>
  <div class="alert" id="alert"></div>
  <form id="loginForm" autocomplete="off">
    <div class="field">
      <label class="field-label" for="email">Email address</label>
      <input type="email" class="field-input" id="email" required placeholder="you@example.com">
    </div>
    <div class="field">
      <label class="field-label" for="password">Password</label>
      <input type="password" class="field-input" id="password" required placeholder="Your password">
    </div>
    <button type="submit" class="btn btn-primary" id="submitBtn">
      <span id="btnText">Sign in</span>
      <span class="spinner" id="spinner"></span>
    </button>
  </form>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function showAlert(msg) {
  const el = document.getElementById('alert');
  el.textContent = msg;
  el.className = 'alert alert-e';
}

function clearAlert() {
  const el = document.getElementById('alert');
  el.className = 'alert';
  el.textContent = '';
}

function setLoading(loading) {
  document.getElementById('submitBtn').disabled = loading;
  document.getElementById('spinner').style.display = loading ? 'inline-block' : 'none';
  document.getElementById('btnText').style.display = loading ? 'none' : 'inline';
}

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  clearAlert();
  if (!navigator.onLine) { showAlert('No internet connection.'); return; }

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) { showAlert('Please fill in all fields.'); return; }

  setLoading(true);
  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) { showAlert(data.error || 'Sign in failed.'); setLoading(false); return; }

    localStorage.setItem('sw_token', data.token);
    localStorage.setItem('sw_user', JSON.stringify(data.user));
    showToast('Signed in successfully.');
    setTimeout(() => { window.location.href = 'unlock.html'; }, 400);
  } catch {
    showAlert('Network error. Please try again.');
    setLoading(false);
  }
});
</script>
</body>
</html>
