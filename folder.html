<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Folder — My Drive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
:root{
  --blue:#1a73e8;--blue-h:#1557b0;--red:#d93025;--red-bg:#fce8e6;
  --green:#1e8e3e;--grn-bg:#e6f4ea;
  --bg:#f8f9fa;--surf:#ffffff;--hov:#f1f3f4;--border:#dadce0;
  --t1:#202124;--t2:#3c4043;--t3:#5f6368;--t4:#80868b;
  --gs:'Google Sans','Roboto',system-ui,sans-serif;
  --rb:'Roboto',system-ui,sans-serif;
  --hh:64px;--r:4px;--rl:12px;--tr:.2s cubic-bezier(.4,0,.2,1);
}
body{font-family:var(--rb);background:var(--bg);color:var(--t2);-webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh}
.header{position:fixed;top:0;left:0;right:0;height:var(--hh);background:var(--surf);border-bottom:1px solid var(--border);z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.header-left{display:flex;align-items:center;gap:16px}
.header-left .back-btn{display:flex;align-items:center;gap:4px;background:none;border:none;cursor:pointer;font-family:var(--gs);font-size:.9rem;color:var(--t3)}
.header-left .back-btn:hover{color:var(--blue)}
.header-left .back-btn svg{width:20px;height:20px}
.logo-text{font-family:var(--gs);font-size:1.15rem;font-weight:500;color:var(--t1)}
.header-right{display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 18px;font-family:var(--gs);font-size:.85rem;font-weight:500;border:none;border-radius:var(--r);cursor:pointer;transition:all var(--tr);text-decoration:none;white-space:nowrap}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-h);box-shadow:0 1px 2px rgba(60,64,67,.3),0 2px 6px rgba(60,64,67,.15)}
.btn-outline{background:transparent;color:var(--blue);border:1px solid var(--border)}
.btn-outline:hover{background:#e8f0fe;border-color:var(--blue)}
.icon-btn{width:40px;height:40px;border:none;background:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);transition:background var(--tr);flex-shrink:0}
.icon-btn:hover{background:var(--hov)}
.icon-btn svg{width:20px;height:20px}
.main{padding-top:calc(var(--hh) + 24px);max-width:1000px;margin:0 auto;padding-left:24px;padding-right:24px;padding-bottom:40px}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.toolbar h2{font-family:var(--gs);font-size:1.3rem;font-weight:500;color:var(--t1)}
.items-list{display:flex;flex-direction:column;gap:8px}
.item-row{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all var(--tr)}
.item-row:hover{box-shadow:0 1px 3px rgba(60,64,67,.15);border-color:var(--t4)}
.item-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff}
.item-icon svg{width:18px;height:18px}
.item-info{flex:1;min-width:0}
.item-title{font-family:var(--gs);font-size:.9rem;font-weight:500;color:var(--t1)}
.item-sub{font-size:.8rem;color:var(--t4);margin-top:2px}
.item-actions{display:flex;gap:4px}
.spinner-lg{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:60px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.alert{padding:10px 14px;border-radius:var(--r);font-size:.8rem;margin-bottom:16px;display:none;max-width:400px}
.alert-e{display:block;background:var(--red-bg);color:var(--red);border:1px solid rgba(217,48,37,.2)}
.empty-state{text-align:center;padding:80px 20px}
.empty-state svg{width:64px;height:64px;color:var(--t4);margin-bottom:16px}
.empty-state h3{font-family:var(--gs);font-size:1.1rem;font-weight:500;color:var(--t2);margin-bottom:8px}
.empty-state p{font-size:.875rem;color:var(--t3);margin-bottom:20px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);padding:32px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 50px rgba(0,0,0,.3)}
.modal h3{font-family:var(--gs);font-size:1.2rem;font-weight:500;color:var(--t1);margin-bottom:20px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{opacity:.9}
.field{margin-bottom:16px}
.field-label{display:block;font-size:.75rem;font-weight:500;color:var(--t3);margin-bottom:4px;letter-spacing:.3px}
.field-input,.field-textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r);font-family:var(--rb);font-size:.9rem;color:var(--t1);background:var(--surf);outline:none;transition:border var(--tr)}
.field-input:hover,.field-textarea:hover{border-color:var(--t3)}
.field-input:focus,.field-textarea:focus{border:2px solid var(--blue);padding:9px 11px}
.field-textarea{resize:vertical;min-height:80px}
.type-selector{display:flex;gap:8px;flex-wrap:wrap}
.type-option{padding:8px 14px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;font-size:.85rem;display:flex;align-items:center;gap:6px;transition:all var(--tr);background:var(--surf);color:var(--t3)}
.type-option:hover{background:var(--hov);border-color:var(--t4)}
.type-option.selected{background:#e8f0fe;border-color:var(--blue);color:var(--blue)}
.type-option svg{width:16px;height:16px}
.toast{position:fixed;bottom:24px;left:24px;z-index:9999;padding:14px 24px;border-radius:var(--r);background:#323232;color:#f5f5f5;font-size:.875rem;box-shadow:0 3px 5px -1px rgba(0,0,0,.2),0 6px 10px rgba(0,0,0,.14);transform:translateY(80px);opacity:0;transition:all .25s cubic-bezier(0,0,.2,1);pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.copy-btn{background:none;border:none;color:var(--blue);cursor:pointer;font-size:.8rem;padding:2px 6px}
.copy-btn:hover{text-decoration:underline}
.image-preview{max-width:100%;border-radius:var(--r);margin-top:8px}
@media(max-width:600px){.main{padding-left:16px;padding-right:16px}.item-row{padding:12px 14px}.type-selector{gap:6px}.type-option{padding:6px 10px;font-size:.8rem}}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <button class="back-btn" onclick="window.location.href='drive.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </button>
    <span class="logo-text" id="folderTitle">Loading...</span>
  </div>
  <div class="header-right">
    <button class="btn btn-primary" onclick="openNewItemModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New
    </button>
    <button class="icon-btn" onclick="logout()" title="Sign out">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</header>

<main class="main">
  <div class="alert" id="alert"></div>
  <div class="spinner-lg" id="spinner"></div>
  <div class="items-list" id="itemsList"></div>
</main>

<!-- Item Modal -->
<div class="modal-overlay" id="itemModal">
  <div class="modal">
    <h3 id="itemModalTitle">New Item</h3>
    <div class="alert" id="modalAlert"></div>
    <input type="hidden" id="editItemId" value="">
    <div class="field" id="typeField">
      <label class="field-label">Type</label>
      <div class="type-selector" id="typeSelector">
        <div class="type-option selected" data-type="note" onclick="selectType('note')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Note
        </div>
        <div class="type-option" data-type="password" onclick="selectType('password')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Password
        </div>
        <div class="type-option" data-type="link" onclick="selectType('link')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          Link
        </div>
        <div class="type-option" data-type="image" onclick="selectType('image')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Image
        </div>
      </div>
    </div>
    <div class="field">
      <label class="field-label" for="itemTitle">Title</label>
      <input type="text" class="field-input" id="itemTitle" placeholder="Item title">
    </div>
    <div id="dynamicFields"></div>
    <div class="modal-actions" id="modalActions">
      <button class="btn btn-outline" onclick="closeItemModal()">Cancel</button>
      <button class="btn btn-primary" id="saveItemBtn" onclick="saveItem()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const token = localStorage.getItem('sw_token');
const user = JSON.parse(localStorage.getItem('sw_user') || 'null');
const masterKeyB64 = sessionStorage.getItem('sw_master_key');
const salt = localStorage.getItem('sw_salt');

if (!token || !user || !masterKeyB64 || !salt) {
  window.location.href = 'index.html';
}

const API = '/api';
const urlParams = new URLSearchParams(window.location.search);
const folderId = urlParams.get('id');

if (!folderId) { window.location.href = 'drive.html'; }

let currentType = 'note';

async function getKey() {
  const raw = Uint8Array.from(atob(masterKeyB64), c => c.charCodeAt(0));
  return await crypto.subtle.importKey('raw', raw, 'AES-GCM', false, ['encrypt', 'decrypt']);
}

async function encrypt(text) {
  const key = await getKey();
  const encoder = new TextEncoder();
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, encoder.encode(text));
  return {
    encrypted: btoa(String.fromCharCode(...new Uint8Array(encrypted))),
    iv: btoa(String.fromCharCode(...iv))
  };
}

async function decrypt(encryptedB64, ivB64) {
  try {
    const key = await getKey();
    const iv = Uint8Array.from(atob(ivB64), c => c.charCodeAt(0));
    const encrypted = Uint8Array.from(atob(encryptedB64), c => c.charCodeAt(0));
    const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, encrypted);
    return new TextDecoder().decode(decrypted);
  } catch { return null; }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = String(s || '');
  return d.innerHTML;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function showAlert(msg) {
  const el = document.getElementById('alert');
  el.textContent = msg;
  el.className = 'alert alert-e';
}

function showModalAlert(msg) {
  const el = document.getElementById('modalAlert');
  el.textContent = msg;
  el.className = 'alert alert-e';
}

function clearModalAlert() {
  const el = document.getElementById('modalAlert');
  el.className = 'alert';
  el.textContent = '';
}

function selectType(type) {
  currentType = type;
  document.querySelectorAll('.type-option').forEach(o => o.classList.toggle('selected', o.dataset.type === type));
  renderDynamicFields();
}

function renderDynamicFields() {
  const container = document.getElementById('dynamicFields');
  if (currentType === 'password') {
    container.innerHTML = `
      <div class="field"><label class="field-label" for="fieldUsername">Username</label><input type="text" class="field-input" id="fieldUsername" placeholder="Username"></div>
      <div class="field"><label class="field-label" for="fieldPassword">Password</label><input type="text" class="field-input" id="fieldPassword" placeholder="Password"></div>
      <div class="field"><label class="field-label" for="fieldUrl">URL (optional)</label><input type="url" class="field-input" id="fieldUrl" placeholder="https://..."></div>
    `;
  } else if (currentType === 'note') {
    container.innerHTML = `
      <div class="field"><label class="field-label" for="fieldNote">Note</label><textarea class="field-textarea" id="fieldNote" placeholder="Write your note..."></textarea></div>
    `;
  } else if (currentType === 'link') {
    container.innerHTML = `
      <div class="field"><label class="field-label" for="fieldLinkUrl">URL</label><input type="url" class="field-input" id="fieldLinkUrl" placeholder="https://..."></div>
      <div class="field"><label class="field-label" for="fieldLinkDesc">Description (optional)</label><input type="text" class="field-input" id="fieldLinkDesc" placeholder="Description"></div>
    `;
  } else if (currentType === 'image') {
    container.innerHTML = `
      <div class="field"><label class="field-label" for="fieldImageFile">Upload Image</label><input type="file" class="field-input" id="fieldImageFile" accept="image/*" onchange="previewImage(this)"></div>
      <img class="image-preview" id="imagePreview" style="display:none">
      <div class="field"><label class="field-label" for="fieldImageUrl">Or paste image URL</label><input type="url" class="field-input" id="fieldImageUrl" placeholder="https://..."></div>
    `;
  }
}

function previewImage(input) {
  const preview = document.getElementById('imagePreview');
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = (e) => { preview.src = e.target.result; preview.style.display = 'block'; };
    reader.readAsDataURL(input.files[0]);
  }
}

function openNewItemModal() {
  clearModalAlert();
  document.getElementById('itemModalTitle').textContent = 'New Item';
  document.getElementById('editItemId').value = '';
  document.getElementById('itemTitle').value = '';
  document.getElementById('saveItemBtn').textContent = 'Save';
  document.getElementById('typeField').style.display = 'block';
  document.getElementById('typeSelector').style.display = 'flex';
  // Remove delete button if exists
  const delBtn = document.getElementById('deleteItemBtn');
  if (delBtn) delBtn.remove();
  selectType('note');
  document.getElementById('itemModal').classList.add('open');
  document.getElementById('itemTitle').focus();
}

function openEditItemModal(item) {
  clearModalAlert();
  document.getElementById('itemModalTitle').textContent = 'Edit Item';
  document.getElementById('editItemId').value = item.id;
  document.getElementById('saveItemBtn').textContent = 'Update';
  document.getElementById('typeField').style.display = 'none';
  currentType = item.type;
  renderDynamicFields();

  decrypt(item.title_enc, item.iv).then(title => {
    document.getElementById('itemTitle').value = title || '';
  });

  decrypt(item.data_enc, item.iv).then(async dataStr => {
    if (!dataStr) return;
    try {
      const data = JSON.parse(dataStr);
      setTimeout(() => {
        if (item.type === 'password') {
          document.getElementById('fieldUsername').value = data.username || '';
          document.getElementById('fieldPassword').value = data.password || '';
          document.getElementById('fieldUrl').value = data.url || '';
        } else if (item.type === 'note') {
          document.getElementById('fieldNote').value = data.text || '';
        } else if (item.type === 'link') {
          document.getElementById('fieldLinkUrl').value = data.url || '';
          document.getElementById('fieldLinkDesc').value = data.description || '';
        } else if (item.type === 'image') {
          document.getElementById('fieldImageUrl').value = data.imgbb_url || data.url || '';
          if (data.imgbb_url) {
            document.getElementById('imagePreview').src = data.imgbb_url;
            document.getElementById('imagePreview').style.display = 'block';
          }
        }
      }, 100);
    } catch {}
  });

  // Add delete button
  const actions = document.getElementById('modalActions');
  if (!document.getElementById('deleteItemBtn')) {
    const delBtn = document.createElement('button');
    delBtn.id = 'deleteItemBtn';
    delBtn.className = 'btn btn-danger';
    delBtn.textContent = 'Delete';
    delBtn.onclick = () => deleteItem(item.id);
    actions.insertBefore(delBtn, actions.firstChild);
  }

  document.getElementById('itemModal').classList.add('open');
}

function closeItemModal() {
  document.getElementById('itemModal').classList.remove('open');
  const delBtn = document.getElementById('deleteItemBtn');
  if (delBtn) delBtn.remove();
}

async function saveItem() {
  const title = document.getElementById('itemTitle').value.trim();
  if (!title) { showModalAlert('Please enter a title.'); return; }

  const editId = document.getElementById('editItemId').value;
  let dataObj = {};

  if (currentType === 'password') {
    const username = document.getElementById('fieldUsername')?.value || '';
    const password = document.getElementById('fieldPassword')?.value || '';
    const url = document.getElementById('fieldUrl')?.value || '';
    if (!username && !password) { showModalAlert('Please enter username or password.'); return; }
    dataObj = { username, password, url };
  } else if (currentType === 'note') {
    dataObj = { text: document.getElementById('fieldNote')?.value || '' };
  } else if (currentType === 'link') {
    const url = document.getElementById('fieldLinkUrl')?.value || '';
    if (!url) { showModalAlert('Please enter a URL.'); return; }
    dataObj = { url, description: document.getElementById('fieldLinkDesc')?.value || '' };
  } else if (currentType === 'image') {
    const imageFile = document.getElementById('fieldImageFile')?.files?.[0];
    const imageUrl = document.getElementById('fieldImageUrl')?.value || '';

    if (imageFile) {
      // Upload to imgbb if key is configured
      const settingsRes = await fetch(API + '/settings', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const settingsData = await settingsRes.json();
      if (settingsData.imgbb_key_enc && settingsData.iv) {
        const imgbbKey = await decrypt(settingsData.imgbb_key_enc, settingsData.iv);
        if (imgbbKey) {
          const formData = new FormData();
          formData.append('image', imageFile);
          try {
            const uploadRes = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, {
              method: 'POST', body: formData
            });
            const uploadData = await uploadRes.json();
            if (uploadData.success) {
              dataObj = { imgbb_url: uploadData.data.url, delete_url: uploadData.data.delete_url };
            } else {
              showModalAlert('Image upload failed. Check your imgbb key in settings.');
              return;
            }
          } catch {
            showModalAlert('Image upload failed. Check your internet connection.');
            return;
          }
        }
      } else {
        showModalAlert('Please configure imgbb API key in Settings first.');
        return;
      }
    } else if (imageUrl) {
      dataObj = { url: imageUrl };
    } else {
      showModalAlert('Please select an image or paste a URL.');
      return;
    }
  }

  const titleEnc = await encrypt(title);
  const dataEnc = await encrypt(JSON.stringify(dataObj));

  if (editId) {
    const res = await fetch(API + '/items/' + editId, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ title_enc: titleEnc.encrypted, data_enc: dataEnc.encrypted, iv: titleEnc.iv })
    });
    if (!res.ok) { showModalAlert('Failed to update item.'); return; }
    showToast('Item updated.');
  } else {
    const res = await fetch(API + '/items', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({
        folder_id: parseInt(folderId),
        type: currentType,
        title_enc: titleEnc.encrypted,
        data_enc: dataEnc.encrypted,
        iv: titleEnc.iv
      })
    });
    if (!res.ok) { showModalAlert('Failed to create item.'); return; }
    showToast('Item created.');
  }

  closeItemModal();
  loadItems();
}

async function deleteItem(id) {
  const res = await fetch(API + '/items/' + id, {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + token }
  });
  if (!res.ok) { showToast('Failed to delete item.'); return; }
  showToast('Item deleted.');
  closeItemModal();
  loadItems();
}

async function copyToClipboard(text) {
  try {
    await navigator.clipboard.writeText(text);
    showToast('Copied to clipboard.');
  } catch {
    showToast('Failed to copy.');
  }
}

async function loadItems() {
  const list = document.getElementById('itemsList');
  const spinner = document.getElementById('spinner');
  list.innerHTML = '';
  spinner.style.display = 'block';
  document.getElementById('alert').className = 'alert';

  try {
    const res = await fetch(API + '/folders/' + folderId, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();

    if (data.folder) {
      const name = await decrypt(data.folder.name_enc, data.folder.iv);
      document.getElementById('folderTitle').textContent = name || 'Folder';
    }

    spinner.style.display = 'none';
    const items = data.items || [];

    if (items.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <h3>No items yet</h3>
          <p>Add notes, links, passwords, or images to this folder</p>
          <button class="btn btn-primary" onclick="openNewItemModal()">Add Item</button>
        </div>
      `;
      return;
    }

    for (const item of items) {
      const title = await decrypt(item.title_enc, item.iv);
      const row = document.createElement('div');
      row.className = 'item-row';
      row.onclick = () => openEditItemModal(item);
      row.innerHTML = `
        <div class="item-icon" style="background:${getColor(item.type)}">
          ${getIcon(item.type)}
        </div>
        <div class="item-info">
          <div class="item-title">${esc(title || 'Untitled')}</div>
          <div class="item-sub">${item.type} &middot; ${new Date(item.updated_at || item.created_at).toLocaleDateString()}</div>
        </div>
        <div class="item-actions">
          ${item.type === 'password' ? '<button class="icon-btn" onclick="event.stopPropagation();copyPassword(' + item.id + ')" title="Copy password"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>' : ''}
          ${item.type === 'link' ? '<button class="icon-btn" onclick="event.stopPropagation();openLink(' + item.id + ')" title="Open link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></button>' : ''}
        </div>
      `;
      // Store item data for actions
      row._itemData = item;
      list.appendChild(row);
    }

    // Add global click handlers
    window.copyPassword = async function(id) {
      const row = document.querySelector(`.item-row[data-id="${id}"]`) || [...document.querySelectorAll('.item-row')].find(r => r._itemData?.id === id);
      if (row?._itemData) {
        const dataStr = await decrypt(row._itemData.data_enc, row._itemData.iv);
        try {
          const data = JSON.parse(dataStr);
          await copyToClipboard(data.password || '');
        } catch {}
      }
    };

    window.openLink = async function(id) {
      const row = [...document.querySelectorAll('.item-row')].find(r => r._itemData?.id === id);
      if (row?._itemData) {
        const dataStr = await decrypt(row._itemData.data_enc, row._itemData.iv);
        try {
          const data = JSON.parse(dataStr);
          if (data.url) window.open(data.url, '_blank');
        } catch {}
      }
    };

    // Fix: make per-item copyPassword/openLink work via closure
    for (const row of list.querySelectorAll('.item-row')) {
      const itemData = row._itemData;
      const copyBtn = row.querySelector('[title="Copy password"]');
      const openBtn = row.querySelector('[title="Open link"]');
      if (copyBtn) {
        copyBtn.onclick = async (e) => {
          e.stopPropagation();
          const dataStr = await decrypt(itemData.data_enc, itemData.iv);
          try {
            const data = JSON.parse(dataStr);
            await copyToClipboard(data.password || '');
          } catch {}
        };
      }
      if (openBtn) {
        openBtn.onclick = async (e) => {
          e.stopPropagation();
          const dataStr = await decrypt(itemData.data_enc, itemData.iv);
          try {
            const data = JSON.parse(dataStr);
            if (data.url) window.open(data.url, '_blank');
          } catch {}
        };
      }
    }
  } catch {
    spinner.style.display = 'none';
    showAlert('Network error. Please try again.');
  }
}

function getColor(type) {
  const map = { password: '#d93025', note: '#1a73e8', link: '#1e8e3e', image: '#f9ab00' };
  return map[type] || '#444';
}

function getIcon(type) {
  const icons = {
    password: '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>',
    note: '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
    link: '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>',
    image: '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>'
  };
  return icons[type] || icons.note;
}

function logout() {
  localStorage.removeItem('sw_token');
  localStorage.removeItem('sw_user');
  sessionStorage.removeItem('sw_master_key');
  window.location.href = 'index.html';
}

let idleTimer;
function resetIdleTimer() {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => {
    sessionStorage.removeItem('sw_master_key');
    window.location.href = 'unlock.html';
  }, 10 * 60 * 1000);
}
document.addEventListener('mousemove', resetIdleTimer);
document.addEventListener('keydown', resetIdleTimer);
document.addEventListener('click', resetIdleTimer);
resetIdleTimer();

document.getElementById('itemModal').addEventListener('click', function(e) { if (e.target === this) closeItemModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeItemModal(); });

loadItems();
</script>
</body>
</html>
